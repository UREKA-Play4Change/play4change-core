global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "play4change-server"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["server:8080"]
    # Labels added to every metric from this job
    # Visible in Grafana for filtering
    relabel_configs:
      - target_label: application
        replacement: play4change