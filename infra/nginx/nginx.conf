server {
    listen 80;
    server_name _;

    # Docker internal DNS — resolve upstream hostnames at request time, not startup.
    # Without this, nginx fails to start if the 'server' container DNS entry isn't
    # immediately available when nginx parses its config on boot.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $upstream http://server:8080;
    set $mgmt     http://server:9090;

    # ── API reverse proxy (prefixed — client builds targeting /play4change-server) ─
    # rewrite strips the /play4change-server prefix before forwarding.
    # proxy_pass with a variable does not auto-strip the location prefix,
    # so the rewrite + break is required to pass only the remaining URI.
    location /play4change-server/ {
        rewrite              ^/play4change-server/(.*) /$1 break;
        proxy_pass           $upstream;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout   120s;
    }

    # ── /actuator/health — proxied to management port (public, used by load balancers) ─
    # All other /actuator/** paths (including /actuator/prometheus) are NOT proxied —
    # they are only accessible internally on port 9090 within the Docker network.
    location = /actuator/health {
        proxy_pass           $mgmt;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout   10s;
    }

    # ── API reverse proxy (unprefixed — direct / demo / CLI access) ────────────
    # NOTE: 'admin' and 'auth' are intentionally excluded — the SPA uses /admin/*
    # and /auth/* as frontend routes. The SPA reaches backend admin/auth endpoints
    # via the /play4change-server/ prefix above. Only non-SPA paths are proxied here.
    # NOTE: 'actuator' is intentionally excluded — /actuator/health has its own rule
    # above and all other actuator endpoints are internal-only (port 9090).
    location ~ ^/(api|swagger-ui|v3)(/|$) {
        proxy_pass           $upstream;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout   120s;
    }

    # ── Static frontend (SPA fallback) ────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
