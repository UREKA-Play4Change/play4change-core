title = "Play4Change Gitleaks Config"

[extend]
useDefault = true

# Add [[allowlist]] entries below for confirmed false positives only.
# Every suppressed finding MUST include a description field explaining why it is not a real credential.

[allowlist]
description = """
demo/*.http files — JetBrains HTTP Client fixtures for manual API testing.
The hex strings flagged as 'generic-api-key' are example token values that
developers copy-paste from server logs or responses into these placeholders.
Magic-link tokens are single-use with a 15-minute TTL (ADR-011) so any token
committed here is cryptographically useless. Refresh tokens rotate on every use
and are revoked on logout; any token committed in April 2026 is long expired.
Assessed 2026-05-01: confirmed development artefacts, not live credentials.

docs/adr/ADR-021.md (commit e3d57c9) — two documentation examples flagged:
  Line 1045: Spring Security startup log from a security audit (ADR-021 A.8).
    The UUID is the ephemeral HTTP Basic password auto-generated by Spring's
    default UserDetailsService. Not a credential in use; documented as a bug.
    Regenerated on every restart — this specific value has never been deployed.
  Line 1130: SHA-256 magic-link token from a manual test session (ADR-021 B.2).
    Magic-link tokens are single-use with a 15-minute TTL (ADR-011). Consumed
    during testing on 2026-05-12 and cannot be replayed.
Assessed 2026-05-14: confirmed documentation artefacts, not live credentials.
"""
paths = ['''demo/.*\.http$''']
commits = ["e3d57c9528380fc1ba91f8867168426926be0a8c"]
