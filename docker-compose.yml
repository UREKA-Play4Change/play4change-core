  services:

    # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
    postgres:
      image: pgvector/pgvector:pg16
      container_name: play4change-postgres
      environment:
        POSTGRES_DB: play4change
        POSTGRES_USER: play4change
        POSTGRES_PASSWORD: play4change
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U play4change -d play4change"]
        interval: 5s
        timeout: 5s
        retries: 5

    # ── MinIO (S3-compatible object storage) ──────────────────────────────────
    minio:
      image: minio/minio:latest
      container_name: play4change-minio
      environment:
        MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
        MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      ports:
        - "9000:9000"
        - "9001:9001"
      volumes:
        - minio_data:/data
      command: server /data --console-address ":9001"
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
        interval: 10s
        timeout: 5s
        retries: 5

    # ── Redis (cache) ─────────────────────────────────────────────────────────
    redis:
      image: redis:7-alpine
      container_name: play4change-redis
      ports:
        - "6379:6379"
      volumes:
        - redis_data:/data
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 5s
        timeout: 3s
        retries: 5

    # ── Unstructured.io PDF extraction API ────────────────────────────────────
    unstructured:
      image: quay.io/unstructured-io/unstructured-api:latest
      container_name: play4change-unstructured
      ports:
        - "9500:8000"
      restart: unless-stopped
      healthcheck:
        test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/healthcheck\")'"]
        interval: 20s
        timeout: 10s
        retries: 5
        start_period: 60s

    # ── Playwright scraper sidecar ────────────────────────────────────────────
    scraper:
      build:
        context: ./infra/scraper
      container_name: play4change-scraper
      restart: unless-stopped
      healthcheck:
        test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
        interval: 15s
        timeout: 10s
        retries: 5
        start_period: 30s

    # ── Spring Boot server ─────────────────────────────────────────────────────
    server:
      build:
        context: .
        dockerfile: server/Dockerfile
      container_name: play4change-server
      environment:
        SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/play4change
        DB_USER: ${DB_USER}
        DB_PASS: ${DB_PASS}
        REDIS_HOST: redis
        REDIS_PORT: 6379
        MINIO_ENDPOINT: http://minio:9000
        MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
        MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
        MINIO_BUCKET: play4change
        SCRAPER_URL: http://scraper:3000
        UNSTRUCTURED_URL: http://unstructured:8000
        MISTRAL_API_KEY: ${MISTRAL_API_KEY}
        RESEND_API_KEY: ${RESEND_API_KEY}
        RESEND_FROM: ${RESEND_FROM}
        JWT_SECRET: ${JWT_SECRET}
        # ── Domain ───────────────────────────────────────────────────────────
        APP_BASE_URL: ${FRONTEND_ORIGIN}
        CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ports:
        - "8080:8080"
      depends_on:
        postgres:
          condition: service_healthy
        minio:
          condition: service_healthy
        redis:
          condition: service_healthy
        scraper:
          condition: service_healthy
        unstructured:
          condition: service_healthy
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:9090/actuator/health"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 60s

    # ── nginx reverse proxy / static frontend ─────────────────────────────────
    nginx:
      image: nginx:1.27-alpine
      container_name: play4change-nginx
      ports:
        - "80:80"
      volumes:
        - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        - ./client/dist:/usr/share/nginx/html:ro
        - ./infra/nginx/well-known:/usr/share/nginx/html/.well-known:ro
      depends_on:
        server:
          condition: service_healthy
      restart: unless-stopped

    # ── Prometheus ────────────────────────────────────────────────────────────
    prometheus:
      image: prom/prometheus:v2.53.0
      container_name: play4change-prometheus
      ports:
        - "9090:9090"
      volumes:
        - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        - ./infra/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      command:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.retention.time=7d"
      depends_on:
        server:
          condition: service_healthy

    # ── Grafana ───────────────────────────────────────────────────────────────
    grafana:
      image: grafana/grafana:11.2.0
      container_name: play4change-grafana
      ports:
        - "3000:3000"
      environment:
        GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
        GF_USERS_ALLOW_SIGN_UP: "false"
      volumes:
        - grafana_data:/var/lib/grafana
        - ./infra/grafana/dashboards:/etc/grafana/dashboards
        - ./infra/grafana/provisioning:/etc/grafana/provisioning
      depends_on:
        - prometheus


  volumes:
    postgres_data:
    minio_data:
    grafana_data:
    redis_data:
