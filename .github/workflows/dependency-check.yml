name: OWASP Dependency Check

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  build-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Copy server runtime dependencies
        # Copies all resolved runtime JARs to server/build/dependencies for dep-check to scan.
        # This avoids the Gradle plugin classloader / Jackson version mismatch in dep-check 10.x.
        # See HACKS.md H04 for full explanation.
        run: ./gradlew :server:copyRuntimeDependencies --no-configuration-cache

      - name: Copy mobile runtime dependencies
        # composeApp: lenient artifact view on androidDebugRuntimeClasspath (KMP variant ambiguity workaround)
        # common: jvmRuntimeClasspath (6 core KMP JARs)
        # See HACKS.md H04 for context on the dep-check Gradle plugin workaround.
        run: ./gradlew :composeApp:copyRuntimeDependencies :common:copyRuntimeDependencies --no-configuration-cache

      - name: Upload server dependencies artifact
        uses: actions/upload-artifact@v7
        with:
          name: server-dependencies
          path: server/build/dependencies/
          retention-days: 1

      - name: Upload mobile dependencies artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mobile-dependencies
          path: |
            composeApp/build/dependencies/
            common/build/dependencies/
          retention-days: 1

  dependency-check:
    needs: build-deps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download server dependencies artifact
        uses: actions/download-artifact@v8
        with:
          name: server-dependencies
          path: server/build/dependencies/

      - name: Download mobile dependencies artifacts
        uses: actions/download-artifact@v8
        with:
          name: mobile-dependencies
          path: mobile-dependencies/

      - name: OWASP Dependency Check (server)
        # ubuntu-latest runners have JAVA_HOME pre-set to a host path that
        # does not exist inside the owasp/dependency-check Docker container.
        # The action passes -e "JAVA_HOME" to Docker, so we override it here
        # to the path Eclipse Temurin uses inside the container image.
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/java/openjdk
        with:
          project: 'play4change-server'
          path: 'server/build/dependencies'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --suppression server/dependency-check-suppression.xml
            --nvdApiKey ${{ secrets.NVD_API_KEY }}
        continue-on-error: false

      - name: OWASP Dependency Check (mobile modules)
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/java/openjdk
        with:
          project: 'play4change-mobile'
          path: 'mobile-dependencies'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --suppression composeApp/dependency-check-suppression.xml
            --suppression common/dependency-check-suppression.xml
            --nvdApiKey ${{ secrets.NVD_API_KEY }}
        continue-on-error: false

      - name: Upload dependency-check reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-reports
          path: reports/
          retention-days: 30
