name: Kotlin CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Secret scanning (gitleaks)
      run: |
        GITLEAKS_VERSION="8.18.4"
        ARCH=$(uname -m | sed 's/x86_64/x64/')
        curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_darwin_${ARCH}.tar.gz" -o gitleaks.tar.gz
        tar -xzf gitleaks.tar.gz gitleaks
        ./gitleaks detect --source . -v

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Restore google-services.json
      run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > composeApp/google-services.json

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build and run tests with Gradle
      run: ./gradlew build

    - name: Detekt
      run: ./gradlew :server:detektMain
