spring:
  application:
    name: play4change-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://play4change-postgres:5432/play4change}
    username: play4change
    password: play4change
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

    messages:
      basename: i18n/messages
      encoding: UTF-8

# ── AI — only activates when api-key is set to a real value ──────────────────
# Leave as 'not-set-yet' to run without Mistral
# Set to your real key when ready to test AI generation
ai:
  mistral:
    api-key: "${MISTRAL_API_KEY:not-set-yet}"
    model: mistral-small-latest
    temperature: 0.7
    timeout-seconds: 60
  generation:
    pool-size: 3
    subtask-count: 3
  dedup:
    full-reuse-threshold: 0.90
    partial-reuse-threshold: 0.65

# ── Observability ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  metrics:
    tags:
      application: ${spring.application.name}
# ── Resilience4j ──────────────────────────────────────────────────────────────
resilience4j:
  circuit-breaker:
    instances:
      aiAgent:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  retry:
    instances:
      aiAgent:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

jwt:
  secret: ${JWT_SECRET:local-dev-secret-change-in-production-must-be-32-chars-minimum}
  access-ttl-minutes: 15
  refresh-ttl-days: 7

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

spring:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME:noreply@ureka.dev}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          starttls:
            enable: true