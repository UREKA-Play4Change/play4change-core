spring:
  application:
    name: play4change-server
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://play4change-postgres:5432/play4change}
    username: play4change
    password: play4change
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  messages:
    basename: i18n/messages
    encoding: UTF-8

# ── AI — only activates when api-key is set to a real value ──────────────────
# Leave as 'not-set-yet' to run without Mistral
# Set to your real key when ready to test AI generation
ai:
  mistral:
    api-key: "${MISTRAL_API_KEY:not-set-yet}"
    model: mistral-small-latest
    temperature: 0.7
    timeout-seconds: 60
  generation:
    pool-size: 3
    subtask-count: 3
  dedup:
    full-reuse-threshold: 0.90
    partial-reuse-threshold: 0.65

# ── Observability ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  metrics:
    tags:
      application: ${spring.application.name}
# ── Resilience4j ──────────────────────────────────────────────────────────────
resilience4j:
  circuit-breaker:
    instances:
      aiAgent:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  retry:
    instances:
      aiAgent:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

jwt:
  secret: ${JWT_SECRET:local-dev-secret-change-in-production-must-be-32-chars-minimum}
  access-ttl-minutes: 15
  refresh-ttl-days: 7

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

resend:
  from: ${RESEND_FROM:noreply@play4change.app}

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:play4change}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

